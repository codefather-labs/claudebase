name: claudebase release

# Cross-platform release pipeline for the `claudebase` Rust CLI.
#
# This workflow is INDEPENDENT of the SDLC repo's `release-engineer` Gate 9.
# Tagging scheme: `claudebase-v<MAJOR>.<MINOR>.<PATCH>` — see
# `tools/claudebase/RELEASING.md` for the full release procedure.
#
# Triggered by:
#   - pushing a tag matching `claudebase-v*` (cuts a GitHub Release)
#   - manual `workflow_dispatch` (build verification only — no release)

on:
  push:
    tags:
      - 'claudebase-v*'
  workflow_dispatch: {}

# Default least-privilege; the `release` job re-declares write access for itself.
permissions:
  contents: read

concurrency:
  group: claudebase-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — actionlint self-check.
  # Gates the matrix: if the workflow file itself is malformed, do not waste
  # 5 runners building binaries (4 GA + 1 Windows best-effort per iter-3).
  # ---------------------------------------------------------------------------
  lint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run actionlint
        shell: bash
        run: |
          # rhysd/actionlint repo has no floating @v1 tag, so the
          # rhysd/actionlint-Action reference fails Set-up-job. Use
          # the upstream-recommended download-script invocation instead;
          # it pulls the latest stable release of the binary and runs
          # it against this workflow file only.
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color .github/workflows/release.yml

  # ---------------------------------------------------------------------------
  # Job 2 — cross-platform release build matrix.
  # Verbatim runner labels per architect decision (load-bearing for Slice 4):
  #   - darwin-arm64 → macos-14
  #   - darwin-x64   → macos-13
  #   - linux-x64    → ubuntu-latest
  #   - linux-arm64  → ubuntu-22.04-arm
  #   - windows-x64  → windows-latest
  # TODO(iter-3.1): Windows build deferred if pdf.rs unix-only imports prevent
  # compilation; iter-3.1 will gate pdf.rs cfg(unix) attributes. The matrix
  # entry is defined now so fail-fast: false lets other platforms succeed even
  # if Windows fails to compile due to `std::os::unix::fs::PermissionsExt`
  # usage in `tools/claudebase/src/pdf.rs:34-77`.
  # ---------------------------------------------------------------------------
  build:
    name: build (${{ matrix.platform }})
    needs: lint
    runs-on: ${{ matrix.runs-on }}
    # iter-2 best-effort platforms (continue-on-error so release job still
    # publishes with the GA platforms even when these fail):
    #   - windows-x64: pdfium-render + MSVC target combination has unresolved
    #     compile-time issues on the windows-latest runner
    #   - darwin-x64 + linux-arm64: ort-sys 2.0.0-rc.12 (transitive via
    #     fastembed) does not ship prebuilt ONNX Runtime binaries for these
    #     targets; building ORT from source needs a separate CMake step
    #     deferred to iter-2.1
    # darwin-x64 dropped from the matrix (ort-sys 2.0.0-rc.12 has no
    # x86_64-apple-darwin prebuilt — Intel Mac is legacy; arm64 is covered).
    # windows-x64 + linux-arm64 stay best-effort as a safety net while the
    # runner/size fixes below settle; flip to false once they build green.
    continue-on-error: ${{ matrix.platform == 'windows-x64' || matrix.platform == 'linux-arm64' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runs-on: macos-14
            target: aarch64-apple-darwin
          - platform: linux-x64
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: linux-arm64
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - platform: windows-x64
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # -----------------------------------------------------------------------
      # Pre-build: download pdfium dynamic library for the target platform.
      # The `claudebase` binary links against pdfium-render at runtime via
      # the canonical path `~/.claude/tools/claudebase/pdfium/lib/`. The
      # release-build smoke test below requires the library to be present.
      # -----------------------------------------------------------------------
      - name: Determine pdfium asset name
        id: pdfium-asset
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            darwin-arm64)   echo "asset=pdfium-mac-arm64.tgz" >> "$GITHUB_OUTPUT" ;;
            darwin-x64)     echo "asset=pdfium-mac-x64.tgz" >> "$GITHUB_OUTPUT" ;;
            linux-x64)      echo "asset=pdfium-linux-x64.tgz" >> "$GITHUB_OUTPUT" ;;
            linux-arm64)    echo "asset=pdfium-linux-arm64.tgz" >> "$GITHUB_OUTPUT" ;;
            windows-x64)    echo "asset=pdfium-win-x64.tgz" >> "$GITHUB_OUTPUT" ;;
            *)              echo "ERROR: unknown platform ${{ matrix.platform }}" >&2; exit 1 ;;
          esac

      - name: Download pdfium dynamic library
        env:
          # Must match KNOWLEDGE_PDFIUM_VERSION in install.sh
          PDFIUM_VERSION: chromium/7802
        shell: bash
        run: |
          mkdir -p "$HOME/.claude/tools/claudebase/pdfium/lib"
          curl --proto '=https' --tlsv1.2 -fsSL --max-redirs 5 --max-time 120 \
            "https://github.com/bblanchon/pdfium-binaries/releases/download/${PDFIUM_VERSION}/${{ steps.pdfium-asset.outputs.asset }}" \
            -o /tmp/pdfium.tgz
          mkdir -p /tmp/pdfium-staging
          tar --no-same-owner --no-same-permissions -xzf /tmp/pdfium.tgz -C /tmp/pdfium-staging
          # Architect action item #3 — grouped alternation: bblanchon Windows
          # archives ship `pdfium.dll` (no `lib` prefix per MSFT convention)
          # while Linux/macOS ship `libpdfium.{so,dylib}`. The `\( ... \)` are
          # find's grouping parens (escaped for the shell).
          find /tmp/pdfium-staging -maxdepth 3 \( -name 'libpdfium*' -o -name 'pdfium*' \) -type f -exec cp {} "$HOME/.claude/tools/claudebase/pdfium/lib/" \;
          ls -la "$HOME/.claude/tools/claudebase/pdfium/lib/"

      - name: Cargo build (release)
        shell: bash
        run: |
          cargo build --release \
            -p claudebase \
            --manifest-path Cargo.toml \
            --target ${{ matrix.target }}

      - name: Assert binary size <= 40 MB (iter-2 NFR-1.1)
        shell: bash
        run: |
          # Windows Cargo emits `claudebase.exe`; unix targets emit `claudebase`.
          EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXT=".exe"
          fi
          BIN="target/${{ matrix.target }}/release/claudebase${EXT}"
          if [ ! -f "$BIN" ]; then
            echo "ERROR: binary not found at $BIN"
            exit 1
          fi
          # Portable size lookup: BSD stat (macOS) uses -f%z, GNU stat uses -c%s,
          # Windows Git Bash has neither — fall back to `wc -c`.
          size=$(stat -f%z "$BIN" 2>/dev/null || stat -c%s "$BIN" 2>/dev/null || wc -c < "$BIN")
          echo "Binary size: $size bytes"
          # 41943040 = 40 * 1024 * 1024. Raised from 35 MB: the multi-agent
          # build's windows-x64 binary is ~37 MB (fastembed-rs + ort +
          # sqlite-vec + ocr-rs PaddleOCR runtime + bundled-sqlite + the
          # multi-agent additions). Typical: linux-x64 ~29 MB, darwin-arm64 ~24 MB.
          test "$size" -le 41943040

      - name: Smoke test (--version exits 0)
        shell: bash
        run: |
          EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXT=".exe"
          fi
          BIN="target/${{ matrix.target }}/release/claudebase${EXT}"
          "$BIN" --version

      # -----------------------------------------------------------------------
      # Smoke test: ingest the calibre-sample.pdf fixture and assert that
      # pdfium-render extracts at least one chunk. Detects regressions in the
      # pdfium dynamic-library wiring or the extraction pipeline before the
      # binary is shipped to users.
      # -----------------------------------------------------------------------
      - name: Smoke test calibre fixture extraction
        shell: bash
        run: |
          # The Slice-1 path-traversal protection (cli::resolve_project_root)
          # rejects ingest paths outside the resolved project-root. To
          # exercise the fixture cleanly, COPY it into the smoke-test
          # project-root first, then ingest by relative name.
          SMOKE_DIR="${RUNNER_TEMP:-/tmp}/sdlc-smoke"
          mkdir -p "$SMOKE_DIR/.claude/knowledge"
          cp "$GITHUB_WORKSPACE/tests/fixtures/calibre-sample.pdf" "$SMOKE_DIR/"
          EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXT=".exe"
          fi
          BIN="$GITHUB_WORKSPACE/target/${{ matrix.target }}/release/claudebase${EXT}"
          "$BIN" --version
          cd "$SMOKE_DIR"
          OUT=$("$BIN" ingest calibre-sample.pdf --json)
          echo "$OUT"
          echo "$OUT" | jq -e '.succeeded_count >= 1' >/dev/null

      - name: Stage release artifact
        shell: bash
        run: |
          # Windows Cargo emits `claudebase.exe`; the staged artifact name
          # also carries `.exe` so users can run it without renaming.
          SRC_EXT=""
          DST_EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            SRC_EXT=".exe"
            DST_EXT=".exe"
          fi
          BIN="target/${{ matrix.target }}/release/claudebase${SRC_EXT}"
          mkdir -p dist
          cp "$BIN" "dist/claudebase-${{ matrix.platform }}${DST_EXT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claudebase-${{ matrix.platform }}
          path: dist/claudebase-${{ matrix.platform }}${{ matrix.platform == 'windows-x64' && '.exe' || '' }}
          if-no-files-found: error
          retention-days: 14

      # -----------------------------------------------------------------------
      # Sibling build: telegram-plugin-rs (Rust port of the official Anthropic
      # Telegram channel plugin). Same matrix piggybacks on the existing
      # checkout + Rust toolchain setup — no separate runner needed. No pdfium
      # dependency (this binary doesn't need it). No fixture smoke test
      # (per-binary correctness validated by the plugin's own integration
      # tests under plugins/telegram-rs/src/*).
      # -----------------------------------------------------------------------
      - name: Cargo build telegram-plugin-rs (release)
        shell: bash
        run: |
          cargo build --release \
            -p telegram-plugin-rs \
            --manifest-path Cargo.toml \
            --target ${{ matrix.target }}

      - name: Smoke test telegram-plugin-rs (--initialize handshake)
        shell: bash
        run: |
          EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXT=".exe"
          fi
          BIN="target/${{ matrix.target }}/release/telegram-plugin-rs${EXT}"
          if [ ! -f "$BIN" ]; then
            echo "ERROR: telegram-plugin-rs binary not found at $BIN"
            exit 1
          fi
          OUT=$(echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}' | "$BIN" 2>/dev/null)
          echo "$OUT"
          echo "$OUT" | grep -q '"protocolVersion":"2025-11-25"'
          echo "$OUT" | grep -q '"name":"telegram-plugin-rs"'

      - name: Stage telegram-plugin-rs artifact
        shell: bash
        run: |
          SRC_EXT=""
          DST_EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            SRC_EXT=".exe"
            DST_EXT=".exe"
          fi
          BIN="target/${{ matrix.target }}/release/telegram-plugin-rs${SRC_EXT}"
          mkdir -p dist
          cp "$BIN" "dist/telegram-plugin-rs-${{ matrix.platform }}${DST_EXT}"

      - name: Upload telegram-plugin-rs artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-plugin-rs-${{ matrix.platform }}
          path: dist/telegram-plugin-rs-${{ matrix.platform }}${{ matrix.platform == 'windows-x64' && '.exe' || '' }}
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Job 3 — cut GitHub Release with all 5 binaries + source tarball attached.
  # Runs only when the workflow was triggered by a `claudebase-v*` tag
  # (workflow_dispatch runs are build-verification-only — no release).
  #
  # The source tarball is built here (not in the matrix) because it is
  # platform-independent — `git archive` honors `.gitattributes` `export-ignore`
  # to strip `.claude/`, `docs/qa/`, `docs/use-cases/`, `books/` (see commit
  # 7e4789c).
  # ---------------------------------------------------------------------------
  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/claudebase-v')
    permissions:
      contents: write
    steps:
      - name: Checkout (full history for git archive)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List downloaded artifacts
        shell: bash
        run: |
          ls -laR dist/

      - name: Build source tarball
        id: source-tarball
        shell: bash
        run: |
          # Strip the `claudebase-v` prefix from the tag to derive VERSION.
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#claudebase-v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          ARCHIVE="claudebase-${VERSION}-source.tar.gz"
          # `.gitattributes` (commit 7e4789c) drives `export-ignore` so
          # `.claude/`, `docs/qa/`, `docs/use-cases/`, `books/` are stripped.
          git archive --format=tar.gz \
            --prefix="claudebase-${VERSION}/" \
            -o "${ARCHIVE}" \
            HEAD
          ls -la "${ARCHIVE}"
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            dist/claudebase-darwin-arm64/claudebase-darwin-arm64
            dist/claudebase-darwin-x64/claudebase-darwin-x64
            dist/claudebase-linux-x64/claudebase-linux-x64
            dist/claudebase-linux-arm64/claudebase-linux-arm64
            dist/claudebase-windows-x64/claudebase-windows-x64.exe
            dist/telegram-plugin-rs-darwin-arm64/telegram-plugin-rs-darwin-arm64
            dist/telegram-plugin-rs-darwin-x64/telegram-plugin-rs-darwin-x64
            dist/telegram-plugin-rs-linux-x64/telegram-plugin-rs-linux-x64
            dist/telegram-plugin-rs-linux-arm64/telegram-plugin-rs-linux-arm64
            dist/telegram-plugin-rs-windows-x64/telegram-plugin-rs-windows-x64.exe
            claude-code-sdlc-${{ steps.source-tarball.outputs.version }}-source.tar.gz
          # Windows-x64 build is best-effort (continue-on-error in matrix).
          # When that build fails, the .exe artifact is missing — we still
          # publish the release with the 4 GA platforms + source tarball.
          # Maintainer attaches the local mingw-built Windows binary
          # manually after the release is created.
          fail_on_unmatched_files: false
