name: spike-ipc

# Slice 0a spike (agent-chat-daemon feature). Validates that the
# `interprocess` v2 crate handles 2 concurrent accept-loop connections
# correctly on Unix domain sockets (Linux + macOS) AND Windows named
# pipes WITHOUT `#[cfg]` branches.
#
# The result of this CI run GATES Slice 1a dispatch:
#   - green on all 3 platforms → Slice 1a uses `interprocess`
#   - red on Windows           → Slice 1a uses platform-arms
#                                (tokio::net::UnixListener on Unix +
#                                 tokio::net::windows::named_pipe::ServerOptions on Windows)
#
# Triggered by:
#   - pull_request touching the standalone spike subcrate or this workflow
#   - workflow_dispatch (manual re-run from the Actions UI)
#
# The spike is a STANDALONE subcrate at `spikes/ipc_concurrent_accept/`
# (NOT in the claudebase workspace and NOT in the main Cargo.toml). This
# isolation avoids the cold-CI-cache failure mode where Cargo recompiles
# the full claudebase dep tree (pdfium, image, fastembed, ocr-rs, ...)
# before reaching the spike binary, blowing past per-step timeouts.

on:
  pull_request:
    paths:
      - 'spikes/ipc_concurrent_accept/**'
      - '.github/workflows/spike-ipc.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: spike-ipc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spike:
    name: spike (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            spikes/ipc_concurrent_accept/target
          key: spike-ipc-${{ runner.os }}-cargo-${{ hashFiles('spikes/ipc_concurrent_accept/Cargo.lock') }}
          restore-keys: |
            spike-ipc-${{ runner.os }}-cargo-

      - name: Run interprocess concurrent-accept spike
        shell: bash
        timeout-minutes: 5
        working-directory: spikes/ipc_concurrent_accept
        run: |
          # The spike binary's internal 30s tokio::time::timeout caps the
          # actual test runtime; this step timeout (5 min) accommodates
          # cold-cache compile of just `interprocess` + `tokio` on Windows
          # MSVC, where MSVC link is slower than Unix.
          cargo run --release
